<ion-header [translucent]="true" mode="md">
  <ion-toolbar>
    <ion-title>
      Ariangram
    </ion-title>

    <ion-buttons slot="end">
      <ion-button>
        <ion-icon style="color: white;" name="chatbubble-ellipses-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <br>

  <div class="story-div">
    <div class="story-main">
      <div class="story" *ngFor="let i of [1, 2, 3, 4, 5]">
        <img src="assets/images/users/{{i}}.jpg" alt="">
      </div>
    </div>
  </div>

  <br>

  <div *ngFor="let i of [1, 2, 3, 4, 5]" class="post">

    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <ion-avatar>
            <img alt="" src="assets/images/users/{{i}}.jpg" />
          </ion-avatar>
          <label>arian</label>
        </ion-col>
        <ion-col class="menu">
          <ion-icon name="ellipsis-horizontal"></ion-icon>
        </ion-col>
      </ion-row>
    </ion-grid>

    <img class="image" src="assets/images/posts/{{i}}.jpg" alt="post">

    <ion-grid>
      <ion-row style="align-items: center;">
        
        <ion-col class="icons" size="auto" style="padding: 0;">
          <ion-button fill="clear" (click)="toggleLike(i)"
            style="font-size: 21px; height: auto; margin: 0; --padding-start: 5px; --padding-end: 0;">
            <ion-icon 
              [name]="likedPosts[i] ? 'heart' : 'heart-outline'" 
              [color]="likedPosts[i] ? 'danger' : 'dark'">
            </ion-icon>
          </ion-button>
        </ion-col>

        <ion-col class="icons" size="auto">
          <ion-icon id="open-modal-comments-{{i}}" name="chatbubble-outline"></ion-icon>
        </ion-col>

        <ion-col class="icons" size="auto">
          <ion-icon id="open-modal-send-{{i}}" name="send-outline"></ion-icon>
        </ion-col>

        <ion-col class="icons" style="text-align: right; padding-right: 8px;">
          <ion-icon name="bookmark-outline"></ion-icon>
        </ion-col>

      </ion-row>
    </ion-grid>

    <div class="caption">
      <span class="writer">arian </span>
      <span class="text">Hello today i sent this post.</span>
      <br>
      <span class="time">10 minutes ago</span>
    </div>

    <ion-modal trigger="open-modal-comments-{{i}}" [initialBreakpoint]="0.5" [breakpoints]="[0, 0.5, 0.8]">
      <ng-template>
        <ion-header>
          <ion-toolbar>
            <ion-title>Comments (Post {{i}})</ion-title>
          </ion-toolbar>
        </ion-header>
        
        <ion-content class="ion-padding">
          <div class="endComment">
            <ion-input placeholder="Type your comment: "></ion-input>
            <ion-icon name="send-outline"></ion-icon>
          </div>

          <ion-item lines="none" *ngFor="let u of [1, 2, 3, 4, 5, 6, 7, 8, 9]">
            <ion-chip>
              <ion-avatar>
                <img src="assets/images/users/{{u}}.jpg" />
              </ion-avatar>
              <ion-label><b>Ariangram</b></ion-label>
            </ion-chip>
            <ion-label class="text">this project is very cool...</ion-label>
          </ion-item>
        </ion-content>
      </ng-template>
    </ion-modal>

    <ion-modal #modal trigger="open-modal-send-{{i}}" [initialBreakpoint]="0.5" [breakpoints]="[0, 0.25, 0.5, 0.75]">
      <ng-template>
        <ion-content>
          <ion-searchbar placeholder="Search" (click)="modal.setCurrentBreakpoint(0.75)"></ion-searchbar>
          <ion-list>
            <ion-item *ngFor="let user of [
              { name: 'Connor Smith', role: 'Sales Rep', img: 'b' },
              { name: 'Daniel Smith', role: 'Product Designer', img: 'a' },
              { name: 'Greg Smith', role: 'Director of Operations', img: 'd' },
              { name: 'Zoey Smith', role: 'CEO', img: 'e' }
            ]">
              <ion-avatar slot="start">
                <ion-img [src]="'https://i.pravatar.cc/300?u=' + user.img"></ion-img>
              </ion-avatar>
              <ion-label>
                <h2>{{ user.name }}</h2>
                <p>{{ user.role }}</p>
              </ion-label>
            </ion-item>
          </ion-list>
        </ion-content>
      </ng-template>
    </ion-modal>

  </div> </ion-content>
